<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Crowdfunding Register</title>
<link rel="stylesheet" href="./master.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#14b8a6
);

padding:20px;
}

.container{

width:100%;
max-width:450px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 15px 35px rgba(0,0,0,.2);

animation:slideUp 1s;
}

@keyframes slideUp{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

font-size:35px;
font-weight:bold;

text-align:center;

margin-bottom:10px;
color:#14b8a6;
}

.title{

text-align:center;

margin-bottom:30px;
color:#333;
}

.input-box{

margin-bottom:20px;
}

.input-box label{

display:block;

margin-bottom:8px;

font-weight:bold;
}

.input-box input{

width:100%;

padding:15px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

outline:none;
}

.input-box input:focus{

border-color:#14b8a6;
}

.checkbox{

display:flex;
align-items:center;

gap:10px;

margin-bottom:20px;
}

.register-btn{

width:100%;
padding:15px;

border:none;

background:#14b8a6;

color:white;

font-size:16px;

font-weight:bold;

border-radius:30px;

cursor:pointer;

transition:.4s;
}

.register-btn:hover{

transform:translateY(-4px);
}

.login-text{

margin-top:20px;

text-align:center;
}

.login-text a{

color:#14b8a6;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Crowdfund
</div>

<h2 class="title">
Create Account
</h2>

<form id="registerForm">

<div class="input-box">

<label>Full Name</label>

<input
type="text"
placeholder="Enter full name"
required
>

</div>

<div class="input-box">

<label>Email</label>

<input
type="email"
placeholder="Enter email"
required
>

</div>

<div class="input-box">

<label>Password</label>

<input
id="password"
type="password"
placeholder="Create password"
required
>

</div>

<div class="input-box">

<label>Confirm Password</label>

<input
type="password"
required
placeholder="Confirm password"
>

</div>

<div class="checkbox">

<input
type="checkbox"
onclick="showPassword()"
>

<span>Show password</span>

</div>

<button
class="register-btn">

Create Account

</button>

<div class="login-text">

Already have an account?

<a href="#">

Login

</a>

</div>

</form>

</div>



<script src="script.js"> </script>
</body>
</html>
